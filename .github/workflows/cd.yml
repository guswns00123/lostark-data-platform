name: CD

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: GCP VM에 SSH로 배포
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.GCP_VM_HOST }}
          username: ${{ secrets.GCP_VM_USER }}
          key: ${{ secrets.GCP_SSH_PRIVATE_KEY }}
          script: |
            set -e

            echo "=== [1/2] 코드 업데이트 ==="
            cd /home/jsdr7204/airflow/lostark-data-platform
            git fetch origin main
            git reset --hard origin/main

            echo "=== [2/2] 배포 완료 ==="
            echo "Docker 볼륨이 레포를 직접 마운트하므로 즉시 반영됩니다."
