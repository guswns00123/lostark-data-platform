name: CD

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: GCP VM에 SSH로 배포
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.GCP_VM_HOST }}
          username: ${{ secrets.GCP_VM_USER }}
          key: ${{ secrets.GCP_SSH_PRIVATE_KEY }}
          script: |
            set -e

            echo "=== [1/3] 코드 업데이트 ==="
            cd /home/jsdr7204/airflow/lostark-data-platform
            git fetch origin main
            git reset --hard origin/main

            echo "=== [2/3] DAG 및 plugins 동기화 ==="
            rsync -av --delete \
              /home/jsdr7204/airflow/lostark-data-platform/dags/ \
              /home/jsdr7204/airflow/dags/

            rsync -av --delete \
              /home/jsdr7204/airflow/lostark-data-platform/plugins/ \
              /home/jsdr7204/airflow/plugins/

            echo "=== [3/3] 배포 완료 ==="
            echo "Airflow가 DAG 변경사항을 자동 감지합니다."
